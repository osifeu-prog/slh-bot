<!DOCTYPE html>
<html>
<head>
    <title>SLH OS Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #1e293b; padding-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 24px; font-weight: bold; }
        .nav { display: flex; gap: 16px; flex-wrap: wrap; }
        .nav a { text-decoration: none; color: #94a3b8; cursor: pointer; font-size: 14px; padding: 4px 8px; border-radius: 4px; transition: color 0.2s; }
        .nav a.active { color: #00ff88; background: rgba(0,255,136,0.08); }
        .nav a:hover { color: #00ff88; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 20px; }
        .card h3 { margin-bottom: 12px; color: #00ff88; font-size: 15px; }
        .stat { font-size: 36px; font-weight: bold; margin: 8px 0; }
        .list { max-height: 300px; overflow-y: auto; font-size: 14px; line-height: 1.7; }
        .list pre { white-space: pre-wrap; word-break: break-all; }
        .btn { background: #00ff88; color: #000; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; margin-top: 12px; }
        .btn:hover { background: #00dd77; }
        .btn-outline { background: transparent; color: #00ff88; border: 1px solid #00ff88; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-top: 8px; }
        .btn-outline:hover { background: rgba(0,255,136,0.1); }
        .section { display: none; }
        .section.active { display: block; }
        .plugin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
        .plugin-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px; }
        .plugin-card h4 { color: #e2e8f0; margin-bottom: 6px; }
        .plugin-card .desc { color: #94a3b8; font-size: 13px; margin-bottom: 10px; }
        .plugin-card .meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #64748b; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge-free { background: rgba(0,255,136,0.15); color: #00ff88; }
        .badge-pro { background: rgba(99,102,241,0.2); color: #818cf8; }
        .badge-installed { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .plan-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .plan-card { background: #1e293b; border: 2px solid #334155; border-radius: 12px; padding: 24px; text-align: center; position: relative; transition: border-color 0.2s; }
        .plan-card.current { border-color: #00ff88; }
        .plan-card.popular { border-color: #818cf8; }
        .plan-card h4 { font-size: 18px; margin-bottom: 8px; }
        .plan-price { font-size: 32px; font-weight: bold; color: #00ff88; margin: 12px 0; }
        .plan-price span { font-size: 14px; color: #64748b; }
        .plan-features { list-style: none; text-align: left; margin: 16px 0; font-size: 13px; color: #94a3b8; }
        .plan-features li { padding: 4px 0; }
        .plan-features li::before { content: "✓ "; color: #00ff88; }
        .popular-badge { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #818cf8; color: #fff; font-size: 11px; padding: 2px 12px; border-radius: 12px; font-weight: bold; }
        .current-badge { position: absolute; top: -10px; right: 12px; background: #00ff88; color: #000; font-size: 11px; padding: 2px 10px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🚀 SLH OS Dashboard</div>
            <div class="nav">
                <a class="active" onclick="showSection('dashboard')">Dashboard</a>
                <a onclick="showSection('agents')">Agents</a>
                <a onclick="showSection('tasks')">Tasks</a>
                <a onclick="showSection('logs')">Logs</a>
                <a onclick="showSection('marketplace')">Marketplace</a>
                <a onclick="showSection('subscriptions')">Subscriptions</a>
            </div>
        </div>

        <div id="dashboard" class="section active">
            <div class="grid">
                <div class="card"><h3>🤖 Agents</h3><div class="stat" id="agent-count">0</div><button class="btn" onclick="loadStats()">Refresh</button></div>
                <div class="card"><h3>📋 Tasks</h3><div class="stat" id="task-count">0</div><button class="btn" onclick="loadStats()">Refresh</button></div>
                <div class="card"><h3>⚡ Health</h3><div class="stat" id="health-status">OK</div><button class="btn" onclick="checkHealth()">Check</button></div>
            </div>
        </div>

        <div id="agents" class="section"><div class="card"><h3>🤖 Agents</h3><div class="list" id="agents-list">Loading...</div><button class="btn" onclick="loadAgents()">Refresh</button></div></div>
        <div id="tasks" class="section"><div class="card"><h3>📋 Tasks</h3><div class="list" id="tasks-list">Loading...</div><button class="btn" onclick="loadTasks()">Refresh</button></div></div>
        <div id="logs" class="section"><div class="card"><h3>📋 Logs</h3><div class="list" id="logs-content"><pre>Loading...</pre></div><button class="btn" onclick="loadLogs()">Refresh</button></div></div>

        <div id="marketplace" class="section">
            <div class="card">
                <h3>🛍️ Plugin Store</h3>
                <div class="plugin-grid" id="plugin-grid">Loading...</div>
            </div>
        </div>

        <div id="subscriptions" class="section">
            <div class="card">
                <h3>📦 Subscription Plans</h3>
                <div class="plan-grid" id="plan-grid">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        const API = '/api';

        async function loadStats() { const r = await fetch(API+'/stats'); const d = await r.json(); document.getElementById('agent-count').textContent = d.agents||0; document.getElementById('task-count').textContent = d.tasks||0; }
        async function loadAgents() { const r = await fetch(API+'/agents'); const d = await r.json(); const div = document.getElementById('agents-list'); const ids = Object.keys(d); div.innerHTML = ids.length ? ids.map(id => `<div>${d[id].name} [${d[id].state||'idle'}] – ${d[id].role||'agent'}</div>`).join('') : 'No agents yet.'; }
        async function loadTasks() { const r = await fetch(API+'/tasks'); const d = await r.json(); const div = document.getElementById('tasks-list'); div.innerHTML = d.length ? d.map(t => `<div>[${t.done?'✅':'⬜'}] ${t.title||t.task||t.text||'?'}</div>`).join('') : 'No tasks yet.'; }
        async function loadLogs() { const r = await fetch(API+'/logs?n=50'); const d = await r.json(); document.querySelector('#logs-content pre').textContent = d.join(''); }
        async function checkHealth() { const r = await fetch(API+'/health'); const d = await r.json(); document.getElementById('health-status').textContent = d.status.toUpperCase(); }

        async function loadMarketplace() {
            const r = await fetch(API+'/plugins/available');
            let plugins = [];
            try { plugins = await r.json(); } catch(e) {}
            const installedR = await fetch(API+'/plugins/installed');
            let installed = {};
            try { installed = await installedR.json(); } catch(e) {}
            const grid = document.getElementById('plugin-grid');
            if (!plugins.length) { grid.innerHTML = 'No plugins in store.'; return; }
            grid.innerHTML = plugins.map(p => {
                const isInstalled = installed[p.id];
                return `<div class="plugin-card">
                    <h4>${p.name}</h4>
                    <div class="desc">${p.description||''}</div>
                    <div class="meta">
                        <span class="badge ${p.price===0?'badge-free':'badge-pro'}">${p.price===0?'Free':'₪'+p.price}</span>
                        ${isInstalled ? '<span class="badge badge-installed">Installed</span>' : `<button class="btn-outline" onclick="installPlugin('${p.id}')">Install</button>`}
                    </div>
                </div>`;
            }).join('');
        }

        async function installPlugin(id) {
            const r = await fetch(API+'/plugins/install', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id}) });
            const d = await r.json();
            alert(d.message||'Done');
            loadMarketplace();
        }

        async function loadSubscriptions() {
            const r = await fetch(API+'/subscriptions/plans');
            let plans = [];
            try { plans = await r.json(); } catch(e) {}
            const grid = document.getElementById('plan-grid');
            if (!plans.length) { grid.innerHTML = 'No plans available.'; return; }
            grid.innerHTML = plans.map(p => `<div class="plan-card ${p.popular?'popular':''}">
                ${p.popular?'<div class="popular-badge">Most Popular</div>':''}
                <h4>${p.name}</h4>
                <div class="plan-price">₪${p.price}<span>/month</span></div>
                <ul class="plan-features">
                    <li>${p.agents} Agents</li>
                    <li>${p.tasks} Tasks</li>
                    <li>${p.plugins} Plugins</li>
                </ul>
                <button class="btn" onclick="subscribe('${p.id}')">Subscribe</button>
            </div>`).join('');
        }

        async function subscribe(plan) {
            const r = await fetch(API+'/subscribe', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({plan, user_id:'8789977826'}) });
            const d = await r.json();
            alert(d.message||'Subscribed!');
        }

        function showSection(s) {
            document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
            document.getElementById(s).classList.add('active');
            document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active');
            if (s==='marketplace') loadMarketplace();
            if (s==='subscriptions') loadSubscriptions();
        }

        loadStats(); loadAgents(); loadTasks(); loadLogs(); checkHealth();
    </script>
</body>
</html>
